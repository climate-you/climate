  expected_tools: [resolve_location, get_metric_series]
  checks:
    - type: numeric
      description: Returns the monthly minimum for Tokyo January 2020
      expected_value: null
      tolerance: 0.5
      unit: "°C"
    - type: contains
      description: Mentions January 2020
      pattern: "January 2020"

- id: L1-18
  layer: 1
  question: "In which month of 2022 did London, UK record its highest temperature?"
  expected_tools: [resolve_location, get_metric_series]
  checks:
    - type: contains
      description: Identifies the correct month (expected July)
      pattern: "July"
    - type: contains
      description: Mentions 2022
      pattern: "2022"

# ---------------------------------------------------------------------------
# Layer 1 — Bare city names (no country qualifier)
# ---------------------------------------------------------------------------

- id: L1-19
  layer: 1
  question: "What was the annual mean temperature in London in 2020?"
  expected_tools: [resolve_location, get_metric_series]
  checks:
    - type: numeric
      description: Returns the correct °C value for London 2020 (same as L1-10)
      expected_value: 11.326
      tolerance: 0.2
      unit: "°C"

- id: L1-20
  layer: 1
  question: "What was the annual mean temperature in Paris in 2020?"
  expected_tools: [resolve_location, get_metric_series]
  checks:
    - type: numeric
      description: Returns the correct °C value for Paris 2020 (same as L1-01)
      expected_value: 12.829
      tolerance: 0.2
      unit: "°C"

# ---------------------------------------------------------------------------
# Layer 2 — Similarity search (find_similar_locations)
# ---------------------------------------------------------------------------

- id: L2-07
  layer: 2
  question: "Which cities have a similar annual mean temperature to London, UK?"
  expected_tools: [find_similar_locations]
  criteria:
    accuracy: "Returns cities whose annual mean is genuinely close to London's ERA5 value"
    specificity: "Includes the temperature values (or delta) for each city listed, not just names"
    relevance: "Does not confuse 'similar temperature' with 'similar climate' in general"
  must_not:
    - "Calls resolve_location + get_metric_series for every candidate city (should use find_similar_locations)"
    - "Lists cities without any temperature values"
