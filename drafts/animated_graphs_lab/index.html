<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Climate Graph Lab</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <h1>Animated Climate Graph Lab</h1>
        <p>Prototype two animated charts inspired by your references.</p>
      </header>

      <section class="controls">
        <button id="play-toggle" type="button">Play</button>
        <label for="year-slider">Visible through year</label>
        <input id="year-slider" type="range" />
        <span id="year-label"></span>
      </section>

      <section class="chart-card">
        <h2>SST hot days (above baseline P90)</h2>
        <div id="chart-hot-days" class="chart"></div>
      </section>

      <section class="chart-card">
        <h2>Sea surface temperature anomaly</h2>
        <div id="chart-anomaly" class="chart"></div>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
